    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1040" height="1100" fill="#ffffff"/>
  <text x="520.0" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">doradura · download pipeline (mp3 / mp4)</text>
  <text x="520.0" y="58" text-anchor="middle" font-size="12" fill="#64748b">crates/dorabot/src/download/pipeline.rs — execute() / download_phase()</text>
  <rect x="330" y="86" width="260" height="44" rx="10" ry="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460.0" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">User sends URL</text>
  <text x="460.0" y="126" text-anchor="middle" font-size="10" fill="#475569">mp3 / mp4  ·  bitrate / quality / time_range</text>
  <path d="M 460.0,160 L 610,200.0 L 460.0,240 L 310,200.0 Z" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460.0" y="198.0" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Cache hit?</text>
  <text x="460.0" y="214.0" text-anchor="middle" font-size="10" fill="#475569">vault · cross-user file_id · preview</text>
  <rect x="330" y="274" width="260" height="60" rx="10" ry="10" fill="#fce7f3" stroke="#be185d" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460.0" y="296" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Resolve source</text>
  <text x="460.0" y="314" text-anchor="middle" font-size="11" fill="#475569">SourceRegistry → yt-dlp · HTTP · Instagram · vlipsy</text>
  <rect x="330" y="358" width="260" height="60" rx="10" ry="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460.0" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Get metadata</text>
  <text x="460.0" y="398" text-anchor="middle" font-size="11" fill="#475569">PREVIEW_CACHE → sanitize (strip NA, split A - T)</text>
  <rect x="330" y="442" width="260" height="72" rx="10" ry="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460.0" y="464" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Pre-checks</text>
  <text x="460" y="482" text-anchor="middle" font-size="11" fill="#334155">disk_space · is_livestream · estimate_size</text>
  <text x="460" y="498" text-anchor="middle" font-size="10" fill="#64748b">reject if disk low / live / too large</text>
  <rect x="330" y="538" width="260" height="94" rx="10" ry="10" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460.0" y="560" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Download with progress</text>
  <text x="460" y="580" text-anchor="middle" font-size="11" fill="#334155">source.download(req, progress_tx) · 16 fragments</text>
  <text x="460" y="596" text-anchor="middle" font-size="11" fill="#334155">tokio::select! loop → progress_msg every ≥5%</text>
  <text x="460" y="612" text-anchor="middle" font-size="10" fill="#64748b">disk re-poll every ~25% · abort on full</text>
  <text x="460" y="670" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">post-process by format</text>
  <rect x="80" y="680" width="340" height="118" rx="10" ry="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#sh)"/>
  <text x="250.0" y="702" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Audio  (mp3)</text>
  <text x="250.0" y="724" text-anchor="middle" font-size="11" fill="#334155">apply_speed_to_file — ffmpeg -af atempo</text>
  <text x="250.0" y="742" text-anchor="middle" font-size="10" fill="#64748b">(only when time_range + speed set)</text>
  <text x="250.0" y="762" text-anchor="middle" font-size="11" fill="#334155">send_audio_with_retry → Telegram</text>
  <text x="250.0" y="780" text-anchor="middle" font-size="10" fill="#64748b">+ audio_effects button (Edit / Cut)</text>
  <rect x="500" y="680" width="460" height="118" rx="10" ry="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5" filter="url(#sh)"/>
  <text x="730.0" y="702" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Video  (mp4)</text>
  <text x="730.0" y="724" text-anchor="middle" font-size="11" fill="#334155">probe_video_metadata (ffprobe) · has_audio_and_video</text>
  <text x="730.0" y="742" text-anchor="middle" font-size="11" fill="#334155">burn_subtitles_into_video · split_video_into_parts</text>
  <text x="730.0" y="762" text-anchor="middle" font-size="11" fill="#334155">send_video_with_retry → Telegram</text>
  <text x="730.0" y="780" text-anchor="middle" font-size="10" fill="#64748b">carousel / photo → send_media_group</text>
  <rect x="330" y="830" width="260" height="72" rx="10" ry="10" fill="#dcfce7" stroke="#059669" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460.0" y="852" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Save history · Vault · Cleanup</text>
  <text x="460" y="870" text-anchor="middle" font-size="11" fill="#334155">save_download_history + categorizer (spawn)</text>
  <text x="460" y="886" text-anchor="middle" font-size="11" fill="#334155">send_to_vault_background · schedule_cleanup</text>
  <rect x="330" y="926" width="260" height="44" rx="10" ry="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460.0" y="948" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Success reaction + auto-clear</text>
  <text x="460.0" y="966" text-anchor="middle" font-size="10" fill="#475569">progress_msg.clear_after(CLEAR_DELAY_SECS)</text>
  <rect x="810" y="434" width="210" height="180" rx="10" ry="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
  <text x="915.0" y="456" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Error path</text>
  <text x="915.0" y="476" text-anchor="middle" font-size="11" fill="#334155">PipelineError</text>
  <text x="915.0" y="492" text-anchor="middle" font-size="10" fill="#64748b">Metadata · PreCheck · Operational</text>
  <text x="915.0" y="516" text-anchor="middle" font-size="11" fill="#334155">analyze_ytdlp_error</text>
  <text x="915.0" y="532" text-anchor="middle" font-size="10" fill="#64748b">🍪 cookies · 🤖 bot · 🚫 unavail</text>
  <text x="915.0" y="548" text-anchor="middle" font-size="10" fill="#64748b">🌐 net · 📦 frag · 💾 disk</text>
  <text x="915.0" y="572" text-anchor="middle" font-size="11" fill="#334155">handle_pipeline_error</text>
  <text x="915.0" y="588" text-anchor="middle" font-size="10" fill="#64748b">sticker · admin alert · metrics</text>
