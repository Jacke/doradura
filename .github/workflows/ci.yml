name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test Suite + Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install yt-dlp

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Run smoke tests
        run: cargo test --test smoke_test -- --nocapture

  env-schema:
    name: Env schema drift check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check code ↔ schema drift
        # Fails if code reads an env var not declared in .env.schema.
        # Prevents "bot panics at runtime because new env var missing".
        # Pure grep, no external deps — keeps CI job cheap.
        run: ./scripts/check-env-drift.sh

  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    # Informational — surfaces CVEs in PR checks without blocking merges
    # on every transitive-dep advisory. Fix as separate prioritised tasks.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit || cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny || cargo install cargo-deny

      - name: Run cargo deny (advisories + licenses + bans)
        # Same hint as cargo-audit — informational; transitive policy
        # violations surface in PR checks but don't block merges. Track
        # via deny.toml ignore entries when intentional.
        run: cargo deny check advisories licenses bans
