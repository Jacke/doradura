name: TUI Release

# Triggered by tags like tui-v0.6.0, tui-v0.7.0, etc.
on:
  push:
    tags:
      - 'tui-v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: dora

jobs:
  # ── Build for each target platform ────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: dora-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: dora-x86_64-apple-darwin.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: dora-x86_64-unknown-linux-gnu.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p doratui

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Build .deb package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#tui-v}"
          PKG="dora_${VERSION}_amd64"
          mkdir -p "${PKG}/usr/bin" "${PKG}/DEBIAN"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "${PKG}/usr/bin/"
          {
            echo "Package: dora"
            echo "Version: ${VERSION}"
            echo "Architecture: amd64"
            echo "Maintainer: Stan <iamjacke@gmail.com>"
            echo "Depends: yt-dlp, ffmpeg"
            echo "Section: utils"
            echo "Priority: optional"
            echo "Homepage: https://github.com/Jacke/doradura"
            echo "Description: Beautiful TUI for media downloading (yt-dlp + ffmpeg)"
            echo " dora is a terminal UI for downloading audio and video via yt-dlp and ffmpeg."
          } > "${PKG}/DEBIAN/control"
          dpkg-deb --build --root-owner-group "${PKG}"
          sha256sum "${PKG}.deb" > "${PKG}.deb.sha256"

      - name: Upload .deb artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: dora-deb
          path: |
            dora_*.deb
            dora_*.deb.sha256

      - name: Create archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#tui-v}"
          STAGING="dora-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "$STAGING/"
          cp README.md LICENSE "$STAGING/" 2>/dev/null || true
          tar czf "${{ matrix.archive }}" "$STAGING"
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  # ── Publish GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate combined checksums file
        run: |
          cd dist
          cat *.sha256 > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt
          echo "=== dist contents ==="
          ls -lh

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#tui-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "dora v${{ steps.version.outputs.version }}"
          body: |
            ## dora v${{ steps.version.outputs.version }}

            Beautiful TUI for media downloading via yt-dlp + ffmpeg.

            ### Install

            **macOS (Homebrew):**
            ```bash
            brew tap Jacke/dora
            brew install dora
            ```

            **Ubuntu / Debian (apt):**
            ```bash
            curl -fsSL https://iamjacke.com/doradura/KEY.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/dora.gpg
            echo "deb [signed-by=/etc/apt/keyrings/dora.gpg] https://iamjacke.com/doradura stable main" | sudo tee /etc/apt/sources.list.d/dora.list
            sudo apt update && sudo apt install dora
            ```

            **Ubuntu / Debian (прямой .deb):**
            ```bash
            curl -LO https://github.com/Jacke/doradura/releases/download/${{ github.ref_name }}/dora_${{ steps.version.outputs.version }}_amd64.deb
            sudo dpkg -i dora_${{ steps.version.outputs.version }}_amd64.deb
            ```

            **Linux / macOS (shell installer):**
            ```bash
            curl -sSfL https://github.com/Jacke/doradura/releases/download/${{ github.ref_name }}/dora-installer.sh | sh
            ```

            **Manual download:** grab the archive for your platform below, extract, and put `dora` in your PATH.

            ### Runtime dependencies
            - [`yt-dlp`](https://github.com/yt-dlp/yt-dlp) — media extraction
            - [`ffmpeg`](https://ffmpeg.org) — audio/video conversion
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update Homebrew tap ───────────────────────────────────────────────────
  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Extract version and checksums
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#tui-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          ARM_SHA=$(awk '{print $1}' dist/dora-aarch64-apple-darwin.tar.gz.sha256)
          INTEL_SHA=$(awk '{print $1}' dist/dora-x86_64-apple-darwin.tar.gz.sha256)
          LINUX_SHA=$(awk '{print $1}' dist/dora-x86_64-unknown-linux-gnu.tar.gz.sha256)

          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "intel_sha=${INTEL_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux_sha=${LINUX_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Jacke/homebrew-dora
          path: homebrew-dora
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          cat > homebrew-dora/Formula/dora.rb << 'FORMULA'
          class Dora < Formula
            desc "Beautiful TUI for media downloading (yt-dlp + ffmpeg)"
            homepage "https://github.com/Jacke/doradura"
            version "${{ steps.meta.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/Jacke/doradura/releases/download/tui-v${{ steps.meta.outputs.version }}/dora-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.meta.outputs.arm_sha }}"
              end
              on_intel do
                url "https://github.com/Jacke/doradura/releases/download/tui-v${{ steps.meta.outputs.version }}/dora-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.meta.outputs.intel_sha }}"
              end
            end

            on_linux do
              url "https://github.com/Jacke/doradura/releases/download/tui-v${{ steps.meta.outputs.version }}/dora-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.meta.outputs.linux_sha }}"
            end

            depends_on "yt-dlp"
            depends_on "ffmpeg"

            def install
              bin.install "dora"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/dora --version 2>&1", 0)
            end
          end
          FORMULA

      - name: Commit and push formula update
        run: |
          cd homebrew-dora
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dora.rb
          git commit -m "dora ${{ steps.meta.outputs.version }}"
          git push

  # ── Update apt repository (GitHub Pages) ─────────────────────────────────
  apt-repo:
    name: Update apt Repository
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: dora-deb
          path: deb/
          merge-multiple: true

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          KEY_FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/{print $10; exit}')
          echo "KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          # Trust the key (import-ownertrust requires full fingerprint)
          echo "${KEY_FPR}:6:" | gpg --import-ownertrust

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#tui-v}" >> "$GITHUB_OUTPUT"

      - name: Build apt repository
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PAGES=gh-pages

          # Copy new .deb into pool
          mkdir -p $PAGES/pool/main
          cp deb/dora_${VERSION}_amd64.deb $PAGES/pool/main/

          # Export public key
          gpg --armor --export $KEY_ID > $PAGES/KEY.gpg

          # Scan all packages (accumulates across versions)
          mkdir -p $PAGES/dists/stable/main/binary-amd64
          dpkg-scanpackages --multiversion $PAGES/pool/main \
            > $PAGES/dists/stable/main/binary-amd64/Packages
          gzip -9 -k -f $PAGES/dists/stable/main/binary-amd64/Packages

          # Build Release file
          cd $PAGES
          {
            echo "Origin: dora"
            echo "Label: dora"
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Architectures: amd64"
            echo "Components: main"
            echo "Description: dora TUI media downloader"
            echo "Date: $(date -u '+%a, %d %b %Y %H:%M:%S UTC')"
          } > dists/stable/Release
          apt-ftparchive release dists/stable >> dists/stable/Release

          # Sign
          gpg --batch --yes --no-tty --pinentry-mode loopback \
            --default-key $KEY_ID \
            -abs -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --no-tty --pinentry-mode loopback \
            --default-key $KEY_ID \
            --clearsign -o dists/stable/InRelease dists/stable/Release

      - name: Commit and push apt repo
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "apt repo: dora ${{ steps.ver.outputs.version }}"
          git push origin gh-pages
