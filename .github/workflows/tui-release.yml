name: TUI Release

# Triggered by tags like tui-v0.6.0, tui-v0.7.0, etc.
on:
  push:
    tags:
      - 'tui-v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: dora

jobs:
  # ── Build for each target platform ────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: dora-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: dora-x86_64-apple-darwin.tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: dora-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            archive: dora-aarch64-unknown-linux-gnu.tar.gz
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p doratui
          else
            cargo build --release --target ${{ matrix.target }} -p doratui
          fi

      - name: Strip binary (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Build .deb package
        if: contains(matrix.target, 'linux-gnu')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#tui-v}"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            DEB_ARCH="arm64"
          else
            DEB_ARCH="amd64"
          fi
          PKG="dora_${VERSION}_${DEB_ARCH}"
          mkdir -p "${PKG}/usr/bin" "${PKG}/DEBIAN"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "${PKG}/usr/bin/"
          {
            echo "Package: dora"
            echo "Version: ${VERSION}"
            echo "Architecture: ${DEB_ARCH}"
            echo "Maintainer: Stan <iamjacke@gmail.com>"
            echo "Depends: yt-dlp, ffmpeg"
            echo "Section: utils"
            echo "Priority: optional"
            echo "Homepage: https://github.com/Jacke/doradura"
            echo "Description: Beautiful TUI for media downloading (yt-dlp + ffmpeg)"
            echo " dora is a terminal UI for downloading audio and video via yt-dlp and ffmpeg."
          } > "${PKG}/DEBIAN/control"
          dpkg-deb --build --root-owner-group "${PKG}"
          sha256sum "${PKG}.deb" > "${PKG}.deb.sha256"

      - name: Upload .deb artifact
        if: contains(matrix.target, 'linux-gnu')
        uses: actions/upload-artifact@v4
        with:
          name: dora-deb-${{ matrix.target }}
          path: |
            dora_*.deb
            dora_*.deb.sha256

      - name: Create archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#tui-v}"
          STAGING="dora-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "$STAGING/"
          cp README.md LICENSE "$STAGING/" 2>/dev/null || true
          tar czf "${{ matrix.archive }}" "$STAGING"
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  # ── Publish GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate combined checksums file
        run: |
          cd dist
          cat *.sha256 > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt
          echo "=== dist contents ==="
          ls -lh

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#tui-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "dora v${{ steps.version.outputs.version }}"
          body: |
            ## dora v${{ steps.version.outputs.version }}

            Beautiful TUI for media downloading via yt-dlp + ffmpeg.

            ### Install

            **macOS (Homebrew):**
            ```bash
            brew tap Jacke/dora
            brew install dora
            ```

            **Arch Linux (AUR):**
            ```bash
            yay -S dora-bin
            ```

            **Ubuntu / Debian (apt):**
            ```bash
            curl -fsSL https://iamjacke.com/doradura/KEY.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/dora.gpg
            echo "deb [signed-by=/etc/apt/keyrings/dora.gpg] https://iamjacke.com/doradura stable main" | sudo tee /etc/apt/sources.list.d/dora.list
            sudo apt update && sudo apt install dora
            ```

            **Ubuntu / Debian (.deb):**
            ```bash
            # x86_64
            curl -LO https://github.com/Jacke/doradura/releases/download/${{ github.ref_name }}/dora_${{ steps.version.outputs.version }}_amd64.deb
            sudo dpkg -i dora_${{ steps.version.outputs.version }}_amd64.deb
            # ARM64
            curl -LO https://github.com/Jacke/doradura/releases/download/${{ github.ref_name }}/dora_${{ steps.version.outputs.version }}_arm64.deb
            sudo dpkg -i dora_${{ steps.version.outputs.version }}_arm64.deb
            ```

            **Manual download:** grab the archive for your platform below, extract, and put `dora` in your PATH.

            ### Platforms
            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon | `dora-aarch64-apple-darwin.tar.gz` |
            | macOS | Intel | `dora-x86_64-apple-darwin.tar.gz` |
            | Linux | x86_64 | `dora-x86_64-unknown-linux-gnu.tar.gz` / `.deb` |
            | Linux | ARM64 | `dora-aarch64-unknown-linux-gnu.tar.gz` / `.deb` |

            ### Runtime dependencies
            - [`yt-dlp`](https://github.com/yt-dlp/yt-dlp) — media extraction
            - [`ffmpeg`](https://ffmpeg.org) — audio/video conversion
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update Homebrew tap ───────────────────────────────────────────────────
  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Extract version and checksums
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#tui-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          ARM_SHA=$(awk '{print $1}' dist/dora-aarch64-apple-darwin.tar.gz.sha256)
          INTEL_SHA=$(awk '{print $1}' dist/dora-x86_64-apple-darwin.tar.gz.sha256)
          LINUX_SHA=$(awk '{print $1}' dist/dora-x86_64-unknown-linux-gnu.tar.gz.sha256)

          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "intel_sha=${INTEL_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux_sha=${LINUX_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Jacke/homebrew-dora
          path: homebrew-dora
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          cat > homebrew-dora/Formula/dora.rb << 'FORMULA'
          class Dora < Formula
            desc "Beautiful TUI for media downloading (yt-dlp + ffmpeg)"
            homepage "https://github.com/Jacke/doradura"
            version "${{ steps.meta.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/Jacke/doradura/releases/download/tui-v${{ steps.meta.outputs.version }}/dora-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.meta.outputs.arm_sha }}"
              end
              on_intel do
                url "https://github.com/Jacke/doradura/releases/download/tui-v${{ steps.meta.outputs.version }}/dora-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.meta.outputs.intel_sha }}"
              end
            end

            on_linux do
              url "https://github.com/Jacke/doradura/releases/download/tui-v${{ steps.meta.outputs.version }}/dora-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.meta.outputs.linux_sha }}"
            end

            depends_on "yt-dlp"
            depends_on "ffmpeg"

            def install
              bin.install "dora"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/dora --version 2>&1", 0)
            end
          end
          FORMULA

      - name: Commit and push formula update
        run: |
          cd homebrew-dora
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dora.rb
          git commit -m "dora ${{ steps.meta.outputs.version }}"
          git push

  # ── Update apt repository (GitHub Pages) ─────────────────────────────────
  apt-repo:
    name: Update apt Repository
    needs: release
    runs-on: ubuntu-22.04
    continue-on-error: true
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dora-deb-*
          path: deb/
          merge-multiple: true

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          KEY_FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/{print $10; exit}')
          echo "KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          # Trust the key (import-ownertrust requires full fingerprint)
          echo "${KEY_FPR}:6:" | gpg --import-ownertrust

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#tui-v}" >> "$GITHUB_OUTPUT"

      - name: Build apt repository
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PAGES=gh-pages

          # Copy new .debs into pool
          mkdir -p $PAGES/pool/main
          cp deb/dora_${VERSION}_amd64.deb $PAGES/pool/main/
          cp deb/dora_${VERSION}_arm64.deb $PAGES/pool/main/

          # Export public key
          gpg --armor --export $KEY_ID > $PAGES/KEY.gpg

          # Work inside gh-pages so dpkg-scanpackages produces correct Filename paths
          cd $PAGES

          # Scan packages for amd64
          mkdir -p dists/stable/main/binary-amd64
          dpkg-scanpackages --multiversion --arch amd64 pool/main \
            > dists/stable/main/binary-amd64/Packages
          gzip -9 -k -f dists/stable/main/binary-amd64/Packages

          # Scan packages for arm64
          mkdir -p dists/stable/main/binary-arm64
          dpkg-scanpackages --multiversion --arch arm64 pool/main \
            > dists/stable/main/binary-arm64/Packages
          gzip -9 -k -f dists/stable/main/binary-arm64/Packages

          # Build Release file
          {
            echo "Origin: dora"
            echo "Label: dora"
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Architectures: amd64 arm64"
            echo "Components: main"
            echo "Description: dora TUI media downloader"
            echo "Date: $(date -u '+%a, %d %b %Y %H:%M:%S UTC')"
          } > dists/stable/Release
          apt-ftparchive release dists/stable >> dists/stable/Release

          # Sign
          gpg --batch --yes --no-tty --pinentry-mode loopback \
            --default-key $KEY_ID \
            -abs -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --no-tty --pinentry-mode loopback \
            --default-key $KEY_ID \
            --clearsign -o dists/stable/InRelease dists/stable/Release

      - name: Commit and push apt repo
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "apt repo: dora ${{ steps.ver.outputs.version }}"
          git push origin gh-pages

  # ── Update AUR package ────────────────────────────────────────────────────
  aur:
    name: Update AUR Package
    needs: release
    runs-on: ubuntu-22.04
    continue-on-error: true
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux archives
        uses: actions/download-artifact@v4
        with:
          pattern: dora-*-unknown-linux-gnu.tar.gz
          path: dist/
          merge-multiple: true

      - name: Extract version and sha256
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#tui-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          SHA_X86=$(awk '{print $1}' dist/dora-x86_64-unknown-linux-gnu.tar.gz.sha256)
          SHA_ARM=$(awk '{print $1}' dist/dora-aarch64-unknown-linux-gnu.tar.gz.sha256)
          echo "sha256_x86=${SHA_X86}" >> "$GITHUB_OUTPUT"
          echo "sha256_arm=${SHA_ARM}" >> "$GITHUB_OUTPUT"

      - name: Set up SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/dora-bin.git /tmp/dora-bin

      - name: Update PKGBUILD and .SRCINFO
        run: |
          V="${{ steps.meta.outputs.version }}"
          SHA_X86="${{ steps.meta.outputs.sha256_x86 }}"
          SHA_ARM="${{ steps.meta.outputs.sha256_arm }}"
          cd /tmp/dora-bin

          # Write PKGBUILD (use printf to avoid heredoc indentation issues)
          printf '%s\n' \
            '# Maintainer: Stan <iamjacke@gmail.com>' \
            'pkgname=dora-bin' \
            "pkgver=${V}" \
            'pkgrel=1' \
            'pkgdesc="Beautiful TUI for media downloading (yt-dlp + ffmpeg)"' \
            "arch=('x86_64' 'aarch64')" \
            'url="https://github.com/Jacke/doradura"' \
            "license=('MIT')" \
            "depends=('yt-dlp' 'ffmpeg')" \
            "provides=('dora')" \
            "conflicts=('dora')" \
            'source_x86_64=("${pkgname}-${pkgver}-x86_64.tar.gz::https://github.com/Jacke/doradura/releases/download/tui-v${pkgver}/dora-x86_64-unknown-linux-gnu.tar.gz")' \
            'source_aarch64=("${pkgname}-${pkgver}-aarch64.tar.gz::https://github.com/Jacke/doradura/releases/download/tui-v${pkgver}/dora-aarch64-unknown-linux-gnu.tar.gz")' \
            "sha256sums_x86_64=('${SHA_X86}')" \
            "sha256sums_aarch64=('${SHA_ARM}')" \
            '' \
            'package() {' \
            '    local srcdir_inner="dora-${pkgver}-${CARCH}-unknown-linux-gnu"' \
            '    install -Dm755 "${srcdir_inner}/dora" "${pkgdir}/usr/bin/dora"' \
            '    if [[ -f "${srcdir_inner}/LICENSE" ]]; then' \
            '        install -Dm644 "${srcdir_inner}/LICENSE" "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"' \
            '    fi' \
            '}' \
            > PKGBUILD

          # Write .SRCINFO (tabs are required by AUR format)
          printf 'pkgbase = dora-bin\n' > .SRCINFO
          printf '\tpkgdesc = Beautiful TUI for media downloading (yt-dlp + ffmpeg)\n' >> .SRCINFO
          printf '\tpkgver = %s\n' "${V}"  >> .SRCINFO
          printf '\tpkgrel = 1\n'           >> .SRCINFO
          printf '\turl = https://github.com/Jacke/doradura\n' >> .SRCINFO
          printf '\tarch = x86_64\n'        >> .SRCINFO
          printf '\tarch = aarch64\n'       >> .SRCINFO
          printf '\tlicense = MIT\n'        >> .SRCINFO
          printf '\tdepends = yt-dlp\n'     >> .SRCINFO
          printf '\tdepends = ffmpeg\n'     >> .SRCINFO
          printf '\tprovides = dora\n'      >> .SRCINFO
          printf '\tconflicts = dora\n'     >> .SRCINFO
          printf '\tsource_x86_64 = dora-bin-%s-x86_64.tar.gz::https://github.com/Jacke/doradura/releases/download/tui-v%s/dora-x86_64-unknown-linux-gnu.tar.gz\n' "${V}" "${V}" >> .SRCINFO
          printf '\tsha256sums_x86_64 = %s\n' "${SHA_X86}" >> .SRCINFO
          printf '\tsource_aarch64 = dora-bin-%s-aarch64.tar.gz::https://github.com/Jacke/doradura/releases/download/tui-v%s/dora-aarch64-unknown-linux-gnu.tar.gz\n' "${V}" "${V}" >> .SRCINFO
          printf '\tsha256sums_aarch64 = %s\n' "${SHA_ARM}" >> .SRCINFO
          printf '\npkgname = dora-bin\n'   >> .SRCINFO

          echo "=== PKGBUILD ===" && cat PKGBUILD
          echo "=== .SRCINFO ===" && cat .SRCINFO

      - name: Commit and push to AUR
        run: |
          cd /tmp/dora-bin
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.meta.outputs.version }}"
          git push origin master
