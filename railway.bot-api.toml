[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.bot-api"

[deploy]
numReplicas = 1
sleepApplication = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 100

[env]
# These are hardcoded in the Dockerfile, but keeping for reference
# API_ID = "25267962"
# API_HASH = "976c013f306cc71b8454ca718ae74cd7"
# HTTP_PORT = "8081"
